<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FYM 140</title>
    
    <!-- Libraries -->
    <script src="assets/aframe.min.js"></script>
    <script src="assets/aframe-event-set-component.min.js"></script>
    <script src="assets/aframe-look-at-component.min.js"></script>
    <script src="assets/tailwind.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
      .a-canvas { width: 100% !important; height: 100% !important; }
      .a-enter-vr { display: none !important; }
      
      .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
      .glass-light { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
      
      .font-serif { font-family: 'Cormorant Garamond', serif; }
      .font-display { font-family: 'Montserrat', sans-serif; }
      
      @keyframes pulse-soft {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(1.1); }
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-pulse-soft { animation: pulse-soft 8s infinite ease-in-out; }
      
      /* Responsive UI Adjustments for Landscape/Small Screens */
      @media (orientation: landscape) and (max-height: 500px) {
        #info-card {
          padding: 1rem !important;
          max-width: 260px !important;
          border-radius: 1.5rem !important;
          margin-bottom: 0 !important;
        }
        #view-fullscreen-btn {
          padding-top: 0.75rem !important;
          padding-bottom: 0.75rem !important;
          font-size: 9px !important;
        }
        #info-card .absolute { display: none; }
      }
      
      /* Screenshot Deterrents */
      body {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      
      #protection-overlay {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 99999;
        display: none;
      }
    </style>

    <script>
      // 1. Configuration Data
      const CURATOR_NOTE = "This is a digital experience that will showcase pictures showing how our Leaders became a good influence through wholeheartedly fulfilling their duty. And as a result, it led to the wholehearted fulfillment of duties by the ministers and ministerial workers and the Church officers";

      const GALLERY_DATA = [
        { id: 1, file: "assets/pic1.jpg" },
        { id: 2, file: "assets/pic2.jpg" },
        { id: 3, file: "assets/pic3.jpg" },
        { id: 4, file: "assets/pic4.jpg" },
        { id: 5, file: "assets/pic5.jpg" },
        { id: 6, file: "assets/pic6.jpg" },
        { id: 7, file: "assets/pic7.jpg" },
        { id: 8, file: "assets/pic8.jpg" },
        { id: 9, file: "assets/pic9.jpg" }
      ];

      // 2. A-Frame Component Registration (Must be before scene)
      if (typeof AFRAME !== 'undefined') {
        AFRAME.registerComponent('maintain-perceived-size', {
          schema: { 
            baseScale: {type: 'number', default: 1},
            referenceDistance: {type: 'number', default: 4.2} // Radius for this layout
          },
          tick: function () {
            const cameraEl = this.el.sceneEl.camera.el;
            if (!cameraEl) return;
            
            const cameraPos = new THREE.Vector3();
            cameraEl.object3D.getWorldPosition(cameraPos);
            
            const entityPos = new THREE.Vector3();
            this.el.object3D.getWorldPosition(entityPos);
            
            const distance = cameraPos.distanceTo(entityPos);
            
            const scaleFactor = (distance / this.data.referenceDistance) * this.data.baseScale;
            const clampedScale = Math.max(0.1, Math.min(2, scaleFactor));
            this.el.object3D.scale.set(clampedScale, clampedScale, clampedScale);
          }
        });

        AFRAME.registerComponent('gallery-item', {
          schema: { id: {type: 'number'} },
          init: function () {
            this.el.addEventListener('click', () => {
              const item = GALLERY_DATA.find(d => d.id === this.data.id);
              window.showInfoCard(item);
            });
            
            this.el.addEventListener('mouseenter', () => {
              const item = GALLERY_DATA.find(d => d.id === this.data.id);
              window.showInfoCard(item);

              const canvas = this.el.querySelector('a-image');
              if (canvas) {
                canvas.setAttribute('animation__pos', {
                  property: 'position',
                  to: '0 0 0.08',
                  dur: 300
                });
              }

              const border = this.el.querySelector('.frame-border');
              if (border) {
                border.setAttribute('material', 'emissive', '#D4AF37');
                border.setAttribute('material', 'emissiveIntensity', '0.5');
              }
            });
            
            this.el.addEventListener('mouseleave', () => {
              const canvas = this.el.querySelector('a-image');
              if (canvas) {
                canvas.setAttribute('animation__pos', {
                  property: 'position',
                  to: '0 0 0',
                  dur: 300
                });
              }

              const border = this.el.querySelector('.frame-border');
              if (border) {
                border.setAttribute('material', 'emissiveIntensity', '0');
              }
            });
          }
        });

        AFRAME.registerComponent('follow-position', {
          schema: { target: {type: 'selector'} },
          tick: function () {
            if (!this.data.target) return;
            const worldPos = new THREE.Vector3();
            this.data.target.object3D.getWorldPosition(worldPos);
            this.el.object3D.position.copy(worldPos);
          }
        });
      }

      window.currentItem = null;

      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'p' || e.key === 'u')) {
          e.preventDefault();
        }
        if (e.key === 'F12') e.preventDefault();
      });

      window.addEventListener('blur', () => {
        document.getElementById('protection-overlay').style.display = 'block';
      });

      window.addEventListener('focus', () => {
        document.getElementById('protection-overlay').style.display = 'none';
      });

      window.showInfoCard = function(item) {
        const card = document.getElementById('info-card');
        if (!card) return;
        if (!item) {
          card.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
          card.classList.remove('pointer-events-auto');
          window.currentItem = null;
          return;
        }
        window.currentItem = item;
        
        card.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
        card.classList.add('pointer-events-auto');
      };

      window.viewFullscreen = function() {
        if (!window.currentItem) return;
        const modal = document.getElementById('fullscreen-modal');
        const img = document.getElementById('fullscreen-img');
        img.src = window.currentItem.file;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => modal.classList.remove('opacity-0'), 10);
      };

      window.closeFullscreen = function() {
        const modal = document.getElementById('fullscreen-modal');
        modal.classList.add('opacity-0');
        setTimeout(() => {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
        }, 500);
      };

      window.enterAR = function() {
        const scene = document.querySelector('a-scene');
        if (!window.isSecureContext && window.location.hostname !== "localhost") {
          alert("AR requires HTTPS to access the camera.");
          return;
        }
        if (!navigator.xr) {
          alert("WebXR/AR is not supported on this browser.");
          return;
        }
        if (scene && scene.enterAR) scene.enterAR();
      };

      window.closeInstructions = function() {
        const modal = document.getElementById('instructions-modal');
        if (modal) modal.classList.add('opacity-0', 'pointer-events-none');
      };
    </script>
  </head>
  <body>
    <!-- A-Frame Scene -->
    <a-scene 
      webxr="overlayElement: #ui-container; optionalFeatures: dom-overlay;" 
      renderer="colorManagement: true; antialias: true; alpha: true;"
    >
      <a-assets id="gallery-assets"></a-assets>

      <a-camera id="main-camera" position="0 1.6 0" look-controls="pointerLockEnabled: false; touchEnabled: true;" wasd-controls="enabled: false">
        <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>
        <a-entity
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
          material="color: #FFD700; shader: flat; opacity: 0.8; transparent: true"
          cursor="fuse: false;"
          raycaster="objects: .clickable"
          animation__enter="property: scale; to: 2 2 2; dur: 200; startEvents: mouseenter"
          animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave"
          animation__click="property: scale; to: 0.5 0.5 0.5; dur: 100; startEvents: click; dir: alternate; loop: 1"
        ></a-entity>
      </a-camera>

      <a-entity id="gallery-container" follow-position="#main-camera" position="0 1.6 0"></a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="1 5 2" intensity="0.4"></a-light>
      
      <a-plane id="floor" rotation="-90 0 0" width="100" height="100" color="#050505" material="roughness: 1; metalness: 0"></a-plane>
      <a-sky id="sky" color="#000"></a-sky>
    </a-scene>

    <div id="protection-overlay"></div>

    <div id="ui-container" class="fixed inset-0 z-50 pointer-events-none">
      <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-6 md:p-10">
      
      <div class="flex justify-between items-start pointer-events-auto relative z-10">
        <div class="glass px-6 py-4 rounded-2xl flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M14.31 8l5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94M9.69 16L3.95 6.06M14.31 16H2.83M16.62 12l-5.74 9.94"/></svg>
          </div>
          <div>
            <h1 class="text-white text-lg font-display font-semibold tracking-tight leading-tight">FYM 140</h1>
            <p class="text-white/40 text-[10px] uppercase tracking-[0.2em] font-medium">VR-AR GALLERY</p>
          </div>
        </div>
        
        <button onclick="location.reload()" class="p-4 glass rounded-full text-white hover:bg-white/20 transition-all duration-300 active:scale-90 pointer-events-auto border border-white/20">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        </button>
      </div>

      <div class="flex flex-row justify-between items-end w-full pointer-events-none relative z-10">
        <div id="info-card" class="opacity-0 translate-y-10 pointer-events-none transition-all duration-500 glass p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-[0_30px_60px_-15px_rgba(0,0,0,0.5)] max-w-[320px] md:max-w-md w-full text-white relative overflow-hidden mb-4 border border-white/10">
          <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>
          <div class="absolute bottom-0 left-0 w-24 h-24 bg-gold-500/5 rounded-full blur-2xl -ml-12 -mb-12 pointer-events-none"></div>
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white/40 to-transparent opacity-30"></div>
          
          <button onclick="window.showInfoCard(null)" class="absolute top-5 right-5 p-2 rounded-full hover:bg-white/15 text-white/30 hover:text-white transition-all duration-300 pointer-events-auto group border border-transparent hover:border-white/10">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="group-hover:rotate-90 transition-transform duration-300"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>

          <div class="relative z-10">
            <button onclick="window.viewFullscreen()" id="view-fullscreen-btn" class="group w-full py-4 bg-white text-black rounded-xl font-display font-bold text-[10px] uppercase tracking-[0.15em] whitespace-nowrap hover:bg-zinc-100 transition-all duration-300 flex items-center justify-center gap-2 pointer-events-auto active:scale-[0.98]">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="group-hover:scale-110 transition-transform"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              View Fullscreen
            </button>
          </div>
        </div>

        <div class="pointer-events-auto flex flex-col items-end">
          <button id="ar-launch-btn" onclick="window.enterAR()" class="group relative px-10 py-5 md:px-14 md:py-7 bg-white text-black rounded-full font-display font-bold flex items-center gap-4 md:gap-5 transition-all duration-500 hover:scale-105 active:scale-95 pointer-events-auto overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] pointer-events-none"></div>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            <span class="tracking-[0.25em] uppercase text-[11px] md:text-sm">Launch AR</span>
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-black/5 flex items-center justify-center group-hover:bg-black/10 transition-all group-hover:translate-x-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
            </div>
          </button>
        </div>
      </div>
      </div>

      <div id="fullscreen-modal" class="hidden fixed inset-0 z-[200] bg-black/95 opacity-0 transition-opacity duration-500 flex flex-col items-center justify-center p-4 md:p-10 pointer-events-auto">
        <button onclick="window.closeFullscreen()" class="absolute top-6 right-6 p-4 rounded-full bg-white/10 text-white hover:bg-white/20 transition-all z-[210] pointer-events-auto">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <img id="fullscreen-img" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl" referrerPolicy="no-referrer">
      </div>
    </div>

    <div id="instructions-modal" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-xl transition-opacity duration-700 flex items-center justify-center p-8 text-center">
      <div class="absolute inset-0 opacity-20 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-yellow-500/30 rounded-full blur-[120px] animate-pulse-soft"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[120px] animate-pulse-soft" style="animation-delay: -4s"></div>
      </div>

      <div class="max-w-md relative">
        <div class="w-20 h-20 mx-auto mb-8 rounded-3xl bg-white/5 flex items-center justify-center border border-white/10">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M14.31 8l5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94M9.69 16L3.95 6.06M14.31 16H2.83M16.62 12l-5.74 9.94"/></svg>
        </div>
        
        <h2 class="text-white text-5xl font-serif italic font-semibold mb-4 tracking-tight">STF Photo</h2>
        <p class="text-white/40 font-display text-[10px] uppercase tracking-[0.4em] mb-10">VR-AR GALLERY</p>
        
        <div class="glass-light p-8 rounded-[2rem] mb-10 text-left relative overflow-hidden">
          <h4 class="text-white/80 text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
            Description:
          </h4>
          <p id="curator-note-display" class="text-white/50 text-xs leading-relaxed italic font-serif"></p>
        </div>

        <div class="space-y-4 mb-12">
          <div class="flex items-center gap-4 text-left glass-light px-6 py-4 rounded-2xl border-white/5">
            <div class="w-6 h-6 rounded-full bg-white/5 flex-shrink-0 flex items-center justify-center text-[10px] font-bold border border-white/10">1</div>
            <p class="text-white/60 text-[11px] font-medium tracking-wide">Explore the space using your device.</p>
          </div>
          <div class="flex items-center gap-4 text-left glass-light px-6 py-4 rounded-2xl border-white/5">
            <div class="w-6 h-6 rounded-full bg-white/5 flex-shrink-0 flex items-center justify-center text-[10px] font-bold border border-white/10">2</div>
            <p class="text-white/60 text-[11px] font-medium tracking-wide">Point the cursor on any picture before viewing it on fullscreen.</p>
          </div>
        </div>

        <button onclick="window.closeInstructions()" class="w-full py-6 bg-white text-black rounded-[2rem] font-display font-bold uppercase tracking-widest hover:bg-white/90 transition-all active:scale-95 text-[14px]">
          Enter Exhibit
        </button>
      </div>
    </div>

    <!-- AR Mode UI -->
    <div id="ar-mode-ui" class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-[60] pointer-events-none">
      <div class="glass px-6 py-3 rounded-full flex items-center gap-3">
        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
        <span class="text-white text-[10px] font-bold uppercase tracking-widest">AR Live Mode</span>
      </div>
    </div>

    <script>
      const assets = document.getElementById('gallery-assets');
      const container = document.getElementById('gallery-container');

      const noteDisplay = document.getElementById('curator-note-display');
      if (noteDisplay) noteDisplay.innerText = `"${CURATOR_NOTE}"`;

      // 3x3 Grid Config
      const numCols = 3;
      const arcPadding = 30; 
      const yRowStep = 1.1;     
      const radius = 4.2;    

      GALLERY_DATA.forEach((item, index) => {
        const img = document.createElement('img');
        img.id = `img-${item.id}`;
        img.src = item.file;
        img.crossOrigin = "anonymous";
        img.referrerPolicy = "no-referrer";
        assets.appendChild(img);

        const col = index % numCols;
        const row = Math.floor(index / numCols);

        const angle = (col - (numCols - 1) / 2) * arcPadding;
        const rad = angle * (Math.PI / 180);
        
        let posX = Math.sin(rad) * radius;
        let posZ = -Math.cos(rad) * radius;
        
        const rowOffset = (Math.floor(GALLERY_DATA.length / numCols) - 1) / 2;
        const posY = (rowOffset - row) * yRowStep + 0.1; 
        
        const entity = document.createElement('a-entity');
        entity.setAttribute('position', `${posX} ${posY} ${posZ}`);
        entity.setAttribute('rotation', `0 ${-angle} 0`);
        entity.setAttribute('maintain-perceived-size', '');

        const baseH = 1.0; 
        const baseW = 1.6;

        entity.innerHTML = `
          <a-box id="frame-border-${item.id}" class="frame-border" position="0 0 -0.03" width="${baseW + 0.06}" height="${baseH + 0.06}" depth="0.04" color="#D4AF37" material="roughness: 0.3; metalness: 0.8"></a-box>
          <a-image id="canvas-${item.id}" src="#img-${item.id}" width="${baseW}" height="${baseH}" class="clickable" gallery-item="id: ${item.id}"></a-image>
        `;

        container.appendChild(entity);

        const checkImg = new Image();
        checkImg.src = item.file;
        checkImg.crossOrigin = "anonymous";
        
        checkImg.onload = function() {
          const ratio = checkImg.naturalWidth / checkImg.naturalHeight;
          let finalW, finalH;
          if (ratio > (baseW / baseH)) {
            finalW = baseW;
            finalH = baseW / ratio;
          } else {
            finalH = baseH;
            finalW = baseH * ratio;
          }
          const canvas = document.getElementById(`canvas-${item.id}`);
          const border = document.getElementById(`frame-border-${item.id}`);
          if (canvas) {
            canvas.setAttribute('width', finalW);
            canvas.setAttribute('height', finalH);
          }
          if (border) {
            border.setAttribute('width', finalW + 0.06);
            border.setAttribute('height', finalH + 0.06);
          }
        };
      });

      const scene = document.querySelector('a-scene');
      scene.addEventListener('enter-vr', () => {
        if (scene.is('ar-mode')) {
          document.getElementById('floor').setAttribute('visible', 'false');
          document.getElementById('sky').setAttribute('visible', 'false');
          document.getElementById('ar-launch-btn').classList.add('hidden');
          document.getElementById('ar-mode-ui').classList.remove('hidden');
        }
      });
      scene.addEventListener('exit-vr', () => {
        document.getElementById('floor').setAttribute('visible', 'true');
        document.getElementById('sky').setAttribute('visible', 'true');
        document.getElementById('ar-launch-btn').classList.remove('hidden');
        document.getElementById('ar-mode-ui').classList.add('hidden');
      });
    </script>
  </body>
</html>
